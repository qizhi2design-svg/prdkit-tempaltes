<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原型页面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">产品原型标题</h1>
            <p class="subtitle">这是一个原型页面示例</p>
        </header>

        <main class="main-content">
            <section class="feature-section">
                <h2>核心功能</h2>
                <div class="feature-grid">
                    <div class="feature-card">
                        <div class="feature-icon">🎯</div>
                        <h3>功能一</h3>
                        <p>功能描述文本</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">⚡</div>
                        <h3>功能二</h3>
                        <p>功能描述文本</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">🚀</div>
                        <h3>功能三</h3>
                        <p>功能描述文本</p>
                    </div>
                </div>
            </section>

            <section class="action-section">
                <h2>操作示例</h2>
                <div class="action-container">
                    <input type="text" id="userInput" class="input-field" placeholder="输入内容...">
                    <button id="submitBtn" class="primary-button">提交</button>
                </div>
                <div id="result" class="result-message"></div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2024 产品原型 - 使用 PRDKit 创建</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
